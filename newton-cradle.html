<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛顿摆 - 3D 物理模拟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #050510;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #e0e0e0;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        canvas { display: block; }

        /* ============ 控制面板 ============ */
        #panel {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 280px;
            background: rgba(12, 12, 30, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px 20px;
            z-index: 100;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        #panel::-webkit-scrollbar { width: 4px; }
        #panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        #panel::-webkit-scrollbar-track { background: transparent; }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 4px;
        }

        .panel-heading {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
        }

        .panel-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 22px;
            font-weight: 400;
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(100, 200, 255, 0.55);
            margin-bottom: 12px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(100, 200, 255, 0.12);
        }

        /* 滑块组 */
        .slider-group {
            margin-bottom: 14px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .slider-label {
            font-size: 12.5px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        .slider-value {
            font-size: 12px;
            font-weight: 600;
            color: #4fc3f7;
            font-variant-numeric: tabular-nums;
            min-width: 36px;
            text-align: right;
        }

        /* 自定义滑块 */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4fc3f7;
            box-shadow: 0 0 8px rgba(79, 195, 247, 0.5), 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 14px rgba(79, 195, 247, 0.7), 0 2px 8px rgba(0,0,0,0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4fc3f7;
            border: none;
            box-shadow: 0 0 8px rgba(79, 195, 247, 0.5);
            cursor: pointer;
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .btn-demo {
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            color: #fff;
        }
        .btn-demo:hover {
            box-shadow: 0 4px 16px rgba(79, 195, 247, 0.35);
            transform: translateY(-1px);
        }

        .btn-pause {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: #fff;
        }
        .btn-pause:hover {
            box-shadow: 0 4px 16px rgba(255, 152, 0, 0.35);
            transform: translateY(-1px);
        }
        .btn-pause.resumed {
            background: linear-gradient(135deg, #66bb6a, #43a047);
        }

        /* 提示 */
        .tips {
            margin-top: 20px;
            padding: 12px;
            background: rgba(79, 195, 247, 0.06);
            border-radius: 8px;
            border: 1px solid rgba(79, 195, 247, 0.1);
        }

        .tips-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(79, 195, 247, 0.6);
            margin-bottom: 8px;
        }

        .tip-item {
            font-size: 11.5px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.6;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tip-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(79, 195, 247, 0.5);
            flex-shrink: 0;
        }

        /* FPS */
        #fps {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255,255,255,0.25);
            font-variant-numeric: tabular-nums;
            z-index: 100;
            pointer-events: none;
        }

        /* 碰撞指示 */
        .collision-flash {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(79, 195, 247, 0.7);
            background: rgba(12, 12, 30, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(79, 195, 247, 0.15);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .collision-flash.visible { opacity: 1; }

        @media (max-width: 640px) {
            #panel {
                width: calc(100vw - 20px);
                left: 10px;
                top: auto;
                bottom: 10px;
                max-height: 45vh;
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="panel">
    <div class="panel-title">物理模拟</div>
    <div class="panel-heading">牛顿摆</div>
    <div class="panel-subtitle">3D 交互式物理演示</div>

    <div class="section-label">物理参数</div>

    <div class="slider-group">
        <div class="slider-header">
            <span class="slider-label">重力加速度</span>
            <span class="slider-value" id="gravity-val">9.8</span>
        </div>
        <input type="range" id="gravity" min="0" max="30" step="0.1" value="9.8">
    </div>

    <div class="slider-group">
        <div class="slider-header">
            <span class="slider-label">空气阻力</span>
            <span class="slider-value" id="damping-val">0.020</span>
        </div>
        <input type="range" id="damping" min="0" max="0.2" step="0.005" value="0.02">
    </div>

    <div class="slider-group">
        <div class="slider-header">
            <span class="slider-label">时间速度</span>
            <span class="slider-value" id="timespeed-val">1.0</span>
        </div>
        <input type="range" id="timespeed" min="0.1" max="3.0" step="0.1" value="1.0">
    </div>

    <div class="section-label">摆架参数</div>

    <div class="slider-group">
        <div class="slider-header">
            <span class="slider-label">绳长</span>
            <span class="slider-value" id="ropelen-val">3.0</span>
        </div>
        <input type="range" id="ropelen" min="1.5" max="5.0" step="0.1" value="3.0">
    </div>

    <div class="slider-group">
        <div class="slider-header">
            <span class="slider-label">球间距</span>
            <span class="slider-value" id="spacing-val">1.0</span>
        </div>
        <input type="range" id="spacing" min="1.0" max="3.0" step="0.1" value="1.0">
    </div>

    <div class="slider-group">
        <div class="slider-header">
            <span class="slider-label">球数量</span>
            <span class="slider-value" id="ballcount-val">5</span>
        </div>
        <input type="range" id="ballcount" min="3" max="7" step="1" value="5">
    </div>

    <div class="btn-row">
        <button class="btn btn-demo" id="btn-demo">演示</button>
        <button class="btn btn-pause" id="btn-pause">暂停</button>
        <button class="btn btn-reset" id="btn-reset">重置</button>
    </div>

    <div class="tips">
        <div class="tips-title">操作说明</div>
        <div class="tip-item"><span class="tip-dot"></span>左键拖拽球体</div>
        <div class="tip-item"><span class="tip-dot"></span>左/右键拖拽空白区域旋转视角</div>
        <div class="tip-item"><span class="tip-dot"></span>滚轮缩放</div>
    </div>
</div>

<div id="fps"></div>
<div class="collision-flash" id="collision-flash">碰撞</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ============================================================
//  配置
// ============================================================
const config = {
    numBalls: 5,
    ballRadius: 0.3,
    ropeLength: 3.0,
    spacingMultiplier: 1.0,
    gravity: 9.8,
    airResistance: 0.02,
    timeSpeed: 1.0,
    stringZOffset: 0.35,
    barRadius: 0.065,
};

// ============================================================
//  状态
// ============================================================
let scene, camera, renderer, orbitControls, clock;
let cradleGroup = null;
let frameRefs = {};       // 结构部件引用，用于平滑更新
let ballStates = [];
let ballMeshes = [];
let raycaster, mouseNDC;
let isDragging = false;
let draggedIndex = -1;
let collisionFlashTimer = 0;
let isPaused = false;

// 拖拽复用对象，避免每帧 GC
const _dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const _dragPt = new THREE.Vector3();
let _lastHoverCheck = 0;
let fpsFrames = 0, fpsTime = 0;

// ============================================================
//  碰撞音效（Web Audio API 模拟钢球撞击声）
// ============================================================
let audioCtx = null;
let noiseBufferCache = null;
let lastSoundTime = 0;          // 上次发声时间
const SOUND_COOLDOWN = 0.05;    // 最小发声间隔（秒）
let prevInContact = [];         // 上一帧各相邻球对是否接触

function ensureAudioCtx() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

// 预生成白噪声缓冲区
function getNoiseBuffer() {
    if (noiseBufferCache) return noiseBufferCache;
    ensureAudioCtx();
    const len = audioCtx.sampleRate * 0.1;
    noiseBufferCache = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = noiseBufferCache.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return noiseBufferCache;
}

function playCollisionSound(intensity) {
    ensureAudioCtx();
    const now = audioCtx.currentTime;
    // 力度映射：轻碰声音小且音调高，重碰声音大且音调低
    const t = Math.min(1, Math.max(0.02, intensity));  // 0~1 归一化力度
    // 音量用指数映射，让人耳感知到明显的轻响差异
    // 轻碰 t=0.05 → vol≈0.006，重碰 t=1.0 → vol≈0.7
    const vol = Math.pow(t, 1.8) * 0.7;
    const freqScale = 1.4 - t * 0.5;                  // 频率：轻碰1.4x(高)，重碰0.9x(低)
    const decayTime = 0.08 + t * 0.22;                 // 衰减时长：轻碰短，重碰长
    const pitchVar = 0.97 + Math.random() * 0.06;

    // 玻璃球共振基频约 3200Hz（材质不同频率不同）
    const baseFreq = 3200 * pitchVar * freqScale;

    // ---- 1. 极短冲击瞬态 ----
    const impulse = audioCtx.createBufferSource();
    impulse.buffer = getNoiseBuffer();
    const gImp = audioCtx.createGain();
    gImp.gain.setValueAtTime(vol * (0.3 + t * 0.4), now);
    gImp.gain.exponentialRampToValueAtTime(0.001, now + 0.002 + t * 0.003);
    const bpImp = audioCtx.createBiquadFilter();
    bpImp.type = 'bandpass';
    bpImp.frequency.value = 5000 * pitchVar * freqScale;
    bpImp.Q.value = 0.7;
    impulse.connect(bpImp).connect(gImp).connect(audioCtx.destination);
    impulse.start(now);
    impulse.stop(now + 0.008);

    // ---- 2. 基频共振 ----
    const osc1 = audioCtx.createOscillator();
    const g1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(baseFreq, now);
    osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.95, now + decayTime);
    g1.gain.setValueAtTime(0.001, now);
    g1.gain.linearRampToValueAtTime(vol, now + 0.0006);
    g1.gain.exponentialRampToValueAtTime(0.001, now + decayTime);
    osc1.connect(g1).connect(audioCtx.destination);
    osc1.start(now);
    osc1.stop(now + decayTime + 0.01);

    // ---- 3. 二次谐波 ----
    const decay2 = decayTime * 0.5;
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(baseFreq * 2.01, now);
    g2.gain.setValueAtTime(0.001, now);
    g2.gain.linearRampToValueAtTime(vol * 0.35, now + 0.0004);
    g2.gain.exponentialRampToValueAtTime(0.001, now + decay2);
    osc2.connect(g2).connect(audioCtx.destination);
    osc2.start(now);
    osc2.stop(now + decay2 + 0.01);

    // ---- 4. 三次谐波 ----
    const decay3 = decayTime * 0.25;
    const osc3 = audioCtx.createOscillator();
    const g3 = audioCtx.createGain();
    osc3.type = 'sine';
    osc3.frequency.setValueAtTime(baseFreq * 3.02, now);
    g3.gain.setValueAtTime(0.001, now);
    g3.gain.linearRampToValueAtTime(vol * 0.15, now + 0.0003);
    g3.gain.exponentialRampToValueAtTime(0.001, now + decay3);
    osc3.connect(g3).connect(audioCtx.destination);
    osc3.start(now);
    osc3.stop(now + decay3 + 0.01);

    // ---- 5. 高次泛音（"叮"的质感）----
    const decay5 = Math.max(0.015, decayTime * 0.12);
    const osc5 = audioCtx.createOscillator();
    const g5 = audioCtx.createGain();
    osc5.type = 'sine';
    osc5.frequency.setValueAtTime(baseFreq * 5.03, now);
    g5.gain.setValueAtTime(0.001, now);
    g5.gain.linearRampToValueAtTime(vol * 0.06, now + 0.0002);
    g5.gain.exponentialRampToValueAtTime(0.001, now + decay5);
    osc5.connect(g5).connect(audioCtx.destination);
    osc5.start(now);
    osc5.stop(now + decay5 + 0.01);

    // ---- 6. 共振尾巴 ----
    const tail = audioCtx.createBufferSource();
    tail.buffer = getNoiseBuffer();
    const gTail = audioCtx.createGain();
    gTail.gain.setValueAtTime(vol * 0.1 * t, now + 0.002);
    gTail.gain.exponentialRampToValueAtTime(0.001, now + 0.04 + t * 0.04);
    const bpTail = audioCtx.createBiquadFilter();
    bpTail.type = 'bandpass';
    bpTail.frequency.value = baseFreq * 1.5;
    bpTail.Q.value = 15;
    tail.connect(bpTail).connect(gTail).connect(audioCtx.destination);
    tail.start(now + 0.002);
    tail.stop(now + 0.1);
}

// ============================================================
//  辅助函数
// ============================================================
function getFrameTop() {
    return config.ropeLength + config.ballRadius + 0.8;
}

function getBallSpacing() {
    return config.spacingMultiplier * 2 * config.ballRadius;
}

// ============================================================
//  初始化场景
// ============================================================
function initScene() {
    const container = document.getElementById('canvas-container');

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    // 启用透射渲染目标，玻璃球才能正确显示背后的物体颜色
    renderer.useLegacyLights = false;
    container.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050510, 0.03);

    // 背景渐变
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2; bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext('2d');
    const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#0a0a20');
    grad.addColorStop(0.5, '#0d0d25');
    grad.addColorStop(1, '#050510');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, 2, 512);
    scene.background = new THREE.CanvasTexture(bgCanvas);

    // 环境贴图（用于金属球反射）
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    const envScene = new RoomEnvironment();
    const envMap = pmrem.fromScene(envScene, 0.04).texture;
    scene.environment = envMap;
    envScene.dispose();
    pmrem.dispose();

    // 相机 — 朝向摆球运动平面（z=0）
    camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, getFrameTop() * 0.45, 9);

    // 轨道控制
    orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.target.set(0, getFrameTop() * 0.45, 0);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.08;
    orbitControls.minDistance = 3;
    orbitControls.maxDistance = 25;
    orbitControls.maxPolarAngle = Math.PI * 0.88;
    orbitControls.update();

    // 灯光
    scene.add(new THREE.AmbientLight(0x404060, 1.0));

    // 主光源 — 从右上方照射，产生清晰阴影
    const dirLight = new THREE.DirectionalLight(0xffffff, 3.0);
    dirLight.position.set(5, 12, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -6;
    dirLight.shadow.camera.right = 6;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -2;
    dirLight.shadow.bias = -0.0003;
    scene.add(dirLight);

    // 补光 — 从左上方照射，柔化阴影
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
    fillLight.position.set(-4, 8, 4);
    fillLight.castShadow = true;
    fillLight.shadow.mapSize.set(1024, 1024);
    fillLight.shadow.camera.near = 0.5;
    fillLight.shadow.camera.far = 20;
    fillLight.shadow.camera.left = -5;
    fillLight.shadow.camera.right = 5;
    fillLight.shadow.camera.top = 6;
    fillLight.shadow.camera.bottom = -2;
    fillLight.shadow.bias = -0.0005;
    scene.add(fillLight);

    const accentLight = new THREE.DirectionalLight(0x4fc3f7, 0.3);
    accentLight.position.set(-3, 4, -2);
    scene.add(accentLight);

    const rimLight = new THREE.PointLight(0x7c4dff, 1.5, 15);
    rimLight.position.set(-4, 6, -4);
    scene.add(rimLight);

    // 地面
    const groundMat = new THREE.MeshStandardMaterial({ color: 0xe8e8ec, metalness: 0.1, roughness: 0.7 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);

    // 聚光灯（地面光斑）
    const spotLight = new THREE.SpotLight(0x4fc3f7, 2, 15, Math.PI / 5, 0.6, 1.5);
    spotLight.position.set(0, 9, 0);
    spotLight.target.position.set(0, 0, 0);
    scene.add(spotLight);
    scene.add(spotLight.target);

    raycaster = new THREE.Raycaster();
    mouseNDC = new THREE.Vector2();
    clock = new THREE.Clock();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ============================================================
//  构建摆架（完整重建，用于球数量变化）
// ============================================================
function buildCradle() {
    disposeCradle();

    cradleGroup = new THREE.Group();
    ballStates = [];
    ballMeshes = [];
    frameRefs = {};

    const ft = getFrameTop();
    const spacing = getBallSpacing();
    const totalSpan = (config.numBalls - 1) * spacing;
    const baseY = 0.08;
    const postZ = config.stringZOffset + 0.08;

    // ---- 共享材质 ----
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, metalness: 0.92, roughness: 0.22 });
    const postMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, metalness: 0.92, roughness: 0.22 });

    // ---- 横杆 ----
    const barLen = totalSpan + 2.2;
    const barGeo = new THREE.CylinderGeometry(config.barRadius, config.barRadius, 1, 24); // 单位长度
    const bar = new THREE.Mesh(barGeo, frameMat);
    bar.rotation.z = Math.PI / 2;
    bar.scale.set(1, barLen, 1); // 通过 scale.y 控制长度
    bar.position.set(0, ft, 0);
    bar.castShadow = true;
    cradleGroup.add(bar);
    frameRefs.bar = bar;

    // ---- 端帽 ----
    const capGeo = new THREE.SphereGeometry(0.1, 16, 16);
    const caps = [-1, 1].map(side => {
        const cap = new THREE.Mesh(capGeo, frameMat);
        cap.position.set(side * barLen / 2, ft, 0);
        cap.castShadow = true;
        cradleGroup.add(cap);
        return cap;
    });
    frameRefs.caps = caps;

    // ---- 立柱 + 连接梁 + 脚垫 ----
    const supportX = totalSpan / 2 + 0.45;
    const postWidth = 0.06;
    const postDepth = 0.03;
    const postHeight = ft - baseY + 0.08;
    const connLen = postZ - config.barRadius;

    const posts = [];
    const conns = [];
    const feet = [];

    [-1, 1].forEach((side, si) => {
        [-1, 1].forEach((zDir, zi) => {
            const idx = si * 2 + zi;
            // 立柱（单位高度，用 scale.y 控制）
            const postGeo = new THREE.BoxGeometry(postWidth, 1, postDepth);
            const post = new THREE.Mesh(postGeo, postMat);
            post.scale.y = postHeight;
            post.position.set(side * supportX, baseY + postHeight / 2, zDir * postZ);
            post.castShadow = true;
            cradleGroup.add(post);
            posts[idx] = post;

            // 连接梁
            const connGeo = new THREE.BoxGeometry(postWidth, 0.035, 1);
            const conn = new THREE.Mesh(connGeo, postMat);
            conn.scale.z = connLen;
            conn.position.set(side * supportX, ft, zDir > 0 ? config.barRadius + connLen / 2 : -(config.barRadius + connLen / 2));
            conn.castShadow = true;
            cradleGroup.add(conn);
            conns[idx] = conn;

            // 脚垫
            const footGeo = new THREE.BoxGeometry(postWidth + 0.04, 0.03, postDepth + 0.06);
            const foot = new THREE.Mesh(footGeo, postMat);
            foot.position.set(side * supportX, baseY + 0.015, zDir * postZ);
            cradleGroup.add(foot);
            feet[idx] = foot;
        });
    });
    frameRefs.posts = posts;
    frameRefs.conns = conns;
    frameRefs.feet = feet;

    // ---- 底座 ----
    const baseW = supportX * 2 + 0.3;
    const baseD = postZ * 2 + 0.3;
    const baseGeo = new THREE.BoxGeometry(1, 0.16, 1); // 单位尺寸，用 scale 控制
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x0e0e18, metalness: 0.75, roughness: 0.35 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.scale.set(baseW, 1, baseD);
    base.position.set(0, 0.08, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    cradleGroup.add(base);
    frameRefs.base = base;

    const edgeMat = new THREE.MeshStandardMaterial({ color: 0x2a2a40, metalness: 0.9, roughness: 0.2 });
    const edgeGeo = new THREE.BoxGeometry(1, 0.02, 1);
    const edge = new THREE.Mesh(edgeGeo, edgeMat);
    edge.scale.set(baseW + 0.04, 1, baseD + 0.04);
    edge.position.set(0, 0.17, 0);
    cradleGroup.add(edge);
    frameRefs.edge = edge;

    // ---- 球体和绳子 ----
    const ballGeo = new THREE.SphereGeometry(config.ballRadius, 64, 64);
    const ballMat = new THREE.MeshPhysicalMaterial({
        color: 0xd8e4f0,
        metalness: 0.0,
        roughness: 0.02,
        clearcoat: 1.0,
        clearcoatRoughness: 0.0,
        reflectivity: 0.9,
        envMapIntensity: 1.2,
        specularIntensity: 1.0,
        specularColor: new THREE.Color(0xffffff),
        sheen: 0.3,
        sheenRoughness: 0.2,
        sheenColor: new THREE.Color(0xaaccff),
    });

    const stringGeo = new THREE.CylinderGeometry(0.012, 0.012, 1, 8);
    const stringMat = new THREE.MeshStandardMaterial({ color: 0x555566, metalness: 0.85, roughness: 0.3 });
    const pegMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, metalness: 0.9, roughness: 0.2 });
    const pegRadius = 0.018;

    const pegs = [];
    const pegTips = [];

    for (let i = 0; i < config.numBalls; i++) {
        const anchorX = (i - (config.numBalls - 1) / 2) * spacing;

        // 挂钉
        [-1, 1].forEach((zDir, zi) => {
            const pegIdx = i * 2 + zi;
            const pegStart = new THREE.Vector3(anchorX, ft, zDir * config.barRadius);
            const pegEnd = new THREE.Vector3(anchorX, ft - config.barRadius, zDir * config.stringZOffset);
            const peg = createCylinderBetween(pegStart, pegEnd, pegRadius, pegMat);
            peg.castShadow = true;
            cradleGroup.add(peg);
            pegs[pegIdx] = peg;

            const tipGeo = new THREE.SphereGeometry(pegRadius * 1.4, 10, 10);
            const tip = new THREE.Mesh(tipGeo, pegMat);
            tip.position.copy(pegEnd);
            cradleGroup.add(tip);
            pegTips[pegIdx] = tip;
        });

        const mesh = new THREE.Mesh(ballGeo, ballMat.clone());
        mesh.castShadow = true;
        cradleGroup.add(mesh);
        ballMeshes.push(mesh);

        const stringL = new THREE.Mesh(stringGeo, stringMat);
        stringL.castShadow = true;
        cradleGroup.add(stringL);
        const stringR = new THREE.Mesh(stringGeo, stringMat);
        stringR.castShadow = true;
        cradleGroup.add(stringR);

        ballStates.push({
            angle: 0,
            angVel: 0,
            anchorX: anchorX,
            isDragging: false,
            mesh: mesh,
            stringL: stringL,
            stringR: stringR,
        });
    }
    frameRefs.pegs = pegs;
    frameRefs.pegTips = pegTips;

    scene.add(cradleGroup);
    updateBallVisuals();
    orbitControls.target.set(0, ft * 0.45, 0);
}

// ============================================================
//  轻量更新布局（绳长/间距变化时调用，不销毁重建）
// ============================================================
function updateCradleLayout() {
    const ft = getFrameTop();
    const spacing = getBallSpacing();
    const totalSpan = (config.numBalls - 1) * spacing;
    const baseY = 0.08;
    const postZ = config.stringZOffset + 0.08;
    const supportX = totalSpan / 2 + 0.45;
    const barLen = totalSpan + 2.2;
    const postHeight = ft - baseY + 0.08;
    const connLen = postZ - config.barRadius;

    // 横杆
    frameRefs.bar.scale.y = barLen;
    frameRefs.bar.position.y = ft;

    // 端帽
    frameRefs.caps[0].position.set(-barLen / 2, ft, 0);
    frameRefs.caps[1].position.set(barLen / 2, ft, 0);

    // 立柱、连接梁、脚垫
    [-1, 1].forEach((side, si) => {
        [-1, 1].forEach((zDir, zi) => {
            const idx = si * 2 + zi;
            frameRefs.posts[idx].scale.y = postHeight;
            frameRefs.posts[idx].position.set(side * supportX, baseY + postHeight / 2, zDir * postZ);

            frameRefs.conns[idx].scale.z = connLen;
            frameRefs.conns[idx].position.set(side * supportX, ft, zDir > 0 ? config.barRadius + connLen / 2 : -(config.barRadius + connLen / 2));

            frameRefs.feet[idx].position.set(side * supportX, baseY + 0.015, zDir * postZ);
        });
    });

    // 底座
    const baseW = supportX * 2 + 0.3;
    const baseD = postZ * 2 + 0.3;
    frameRefs.base.scale.set(baseW, 1, baseD);
    frameRefs.edge.scale.set(baseW + 0.04, 1, baseD + 0.04);

    // 更新球锚点和挂钉位置
    for (let i = 0; i < config.numBalls; i++) {
        const anchorX = (i - (config.numBalls - 1) / 2) * spacing;
        ballStates[i].anchorX = anchorX;

        // 更新挂钉
        [-1, 1].forEach((zDir, zi) => {
            const pegIdx = i * 2 + zi;
            const pegStart = new THREE.Vector3(anchorX, ft, zDir * config.barRadius);
            const pegEnd = new THREE.Vector3(anchorX, ft - config.barRadius, zDir * config.stringZOffset);
            updateCylinderBetween(frameRefs.pegs[pegIdx], pegStart, pegEnd);
            frameRefs.pegTips[pegIdx].position.copy(pegEnd);
        });
    }

    updateBallVisuals();
    orbitControls.target.set(0, ft * 0.45, 0);
}

// 更新已有圆柱 mesh 的位置和朝向
function updateCylinderBetween(mesh, start, end) {
    const dir = new THREE.Vector3().subVectors(end, start);
    const len = dir.length();
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    mesh.position.copy(mid);
    mesh.scale.y = len;
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
}

function disposeCradle() {
    if (!cradleGroup) return;
    scene.remove(cradleGroup);
    cradleGroup.traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
        }
    });
    cradleGroup = null;
    frameRefs = {};
}

function createCylinderBetween(start, end, radius, material) {
    const dir = new THREE.Vector3().subVectors(end, start);
    const len = dir.length();
    const geo = new THREE.CylinderGeometry(radius, radius, len, 16);
    const mesh = new THREE.Mesh(geo, material);
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    mesh.position.copy(mid);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
    return mesh;
}

// ============================================================
//  更新球体视觉
// ============================================================
function updateBallVisuals() {
    const ft = getFrameTop();
    const L = config.ropeLength;

    for (const b of ballStates) {
        const x = b.anchorX + L * Math.sin(b.angle);
        const y = ft - L * Math.cos(b.angle);
        b.mesh.position.set(x, y, 0);

        if (b.isDragging) {
            b.mesh.material.emissive.setHex(0x1a3a5c);
            b.mesh.material.emissiveIntensity = 0.6;
        } else {
            b.mesh.material.emissive.setHex(0x000000);
            b.mesh.material.emissiveIntensity = 0;
        }

        const anchorL = new THREE.Vector3(b.anchorX, ft - config.barRadius, config.stringZOffset);
        const anchorR = new THREE.Vector3(b.anchorX, ft - config.barRadius, -config.stringZOffset);
        const ballPos = new THREE.Vector3(x, y, 0);
        updateStringMesh(b.stringL, anchorL, ballPos);
        updateStringMesh(b.stringR, anchorR, ballPos);
    }
}

function updateStringMesh(mesh, start, end) {
    const dir = new THREE.Vector3().subVectors(end, start);
    const len = dir.length();
    if (len < 0.001) return;
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    mesh.position.copy(mid);
    mesh.scale.y = len;
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
}

// ============================================================
//  物理模拟
// ============================================================
function updatePhysics(dt) {
    const realDt = Math.min(dt, 1 / 30);
    const simDt = realDt * config.timeSpeed;
    const hasDrag = ballStates.some(b => b.isDragging);

    if (hasDrag) {
        // 拖拽时：简化处理，只推开重叠球体，不做完整物理
        // 避免被拖球大位移导致碰撞系统震荡
        const L = config.ropeLength;
        for (const b of ballStates) {
            b.prevAngle = b.angle;
            if (b.isDragging) continue;
            const gScaled = config.gravity * 5.0;
            const angAcc = -(gScaled / L) * Math.sin(b.angle) - config.airResistance * b.angVel;
            b.angVel += angAcc * simDt;
            b.angle += b.angVel * simDt;
            if (b.angle > Math.PI * 0.48) { b.angle = Math.PI * 0.48; b.angVel *= -0.3; }
            if (b.angle < -Math.PI * 0.48) { b.angle = -Math.PI * 0.48; b.angVel *= -0.3; }
        }
        // 单次位置修正即可
        resolveOverlap();
    } else {
        // 非拖拽：完整物理模拟，8 子步
        const substeps = 8;
        const subDt = simDt / substeps;
        const L = config.ropeLength;
        const g = config.gravity;
        const drg = config.airResistance;

        for (let s = 0; s < substeps; s++) {
            for (const b of ballStates) {
                b.prevAngle = b.angle;
                const gScaled = g * 5.0;
                const angAcc = -(gScaled / L) * Math.sin(b.angle) - drg * b.angVel;
                b.angVel += angAcc * subDt;
                b.angle += b.angVel * subDt;
                if (b.angle > Math.PI * 0.48) { b.angle = Math.PI * 0.48; b.angVel *= -0.3; }
                if (b.angle < -Math.PI * 0.48) { b.angle = -Math.PI * 0.48; b.angVel *= -0.3; }
            }
            handleCollisions();
        }
    }
    updateBallVisuals();
}

// 轻量级重叠修正 + 碰撞声音（拖拽时使用）
function resolveOverlap() {
    const L = config.ropeLength;
    const minDist = 2 * config.ballRadius;
    let impactStrength = 0;
    const nowInContact = [];

    for (let iter = 0; iter < 5; iter++) {
        let anyOverlap = false;
        for (let i = 0; i < ballStates.length - 1; i++) {
            const a = ballStates[i];
            const b = ballStates[i + 1];
            const ax = a.anchorX + L * Math.sin(a.angle);
            const bx = b.anchorX + L * Math.sin(b.angle);
            const dx = bx - ax;
            const dist = Math.abs(dx);

            if (dist < minDist) {
                anyOverlap = true;
                if (iter === 0) nowInContact[i] = true;
                const overlap = minDist - dist;
                const nx = dx > 0 ? 1 : -1;
                const corrAngle = overlap / L;

                if (a.isDragging) {
                    b.angle += corrAngle * nx;
                    // 给被推球一个基于推开方向的速度
                    const pushVel = corrAngle * nx * 60; // 放大映射到角速度
                    b.angVel = pushVel;
                    // 检测是否为首次接触，触发声音
                    if (!(prevInContact[i] || false)) {
                        impactStrength = Math.max(impactStrength, Math.abs(pushVel) * 2);
                    }
                } else if (b.isDragging) {
                    a.angle -= corrAngle * nx;
                    const pushVel = -corrAngle * nx * 60;
                    a.angVel = pushVel;
                    if (!(prevInContact[i] || false)) {
                        impactStrength = Math.max(impactStrength, Math.abs(pushVel) * 2);
                    }
                } else {
                    a.angle -= (corrAngle / 2) * nx;
                    b.angle += (corrAngle / 2) * nx;
                    // 非拖拽球之间的碰撞：交换速度
                    const relVn = (b.angVel - a.angVel) * nx;
                    if (relVn < 0) {
                        const temp = a.angVel;
                        a.angVel = b.angVel;
                        b.angVel = temp;
                        a.angVel *= 0.999;
                        b.angVel *= 0.999;
                        if (!(prevInContact[i] || false) && Math.abs(relVn) > 0.1) {
                            impactStrength = Math.max(impactStrength, Math.abs(relVn));
                        }
                    } else {
                        a.angVel *= 0.8;
                        b.angVel *= 0.8;
                    }
                }
            } else {
                if (iter === 0) nowInContact[i] = false;
            }
        }
        if (!anyOverlap) break;
    }

    // 更新接触状态
    prevInContact = nowInContact.slice();

    // 触发碰撞声音
    if (impactStrength > 0) {
        collisionFlashTimer = 0.3;
        const now = performance.now() / 1000;
        if (now - lastSoundTime >= SOUND_COOLDOWN) {
            lastSoundTime = now;
            const normalized = Math.min(1, Math.log(1 + impactStrength * 2) / Math.log(1 + 20));
            playCollisionSound(normalized);
        }
    }
}

function handleCollisions() {
    const L = config.ropeLength;
    const minDist = 2 * config.ballRadius;
    let impactStrength = 0;
    const nowInContact = [];

    for (let iter = 0; iter < 10; iter++) {
        let anyCollision = false;
        for (let i = 0; i < ballStates.length - 1; i++) {
            const a = ballStates[i];
            const b = ballStates[i + 1];
            const ax = a.anchorX + L * Math.sin(a.angle);
            const bx = b.anchorX + L * Math.sin(b.angle);
            const dx = bx - ax;
            const dist = Math.abs(dx);

            if (dist < minDist && dist > 0.0001) {
                anyCollision = true;
                if (iter === 0) nowInContact[i] = true;

                const nx = dx > 0 ? 1 : -1;
                const avx = L * a.angVel * Math.cos(a.angle);
                const bvx = L * b.angVel * Math.cos(b.angle);
                const relVn = (bvx - avx) * nx;

                if (relVn < 0) {
                    // 弹性碰撞：交换角速度
                    const temp = a.angVel;
                    a.angVel = b.angVel;
                    b.angVel = temp;
                    a.angVel *= 0.999;
                    b.angVel *= 0.999;

                    const impactSpeed = Math.abs(relVn);
                    const wasInContact = prevInContact[i] || false;
                    if (iter === 0 && impactSpeed > 0.1 && !wasInContact) {
                        impactStrength = Math.max(impactStrength, impactSpeed);
                    }
                }

                const overlap = minDist - dist;
                const corrAngle = (overlap / 2) / L;
                a.angle -= corrAngle * nx;
                b.angle += corrAngle * nx;
            } else {
                if (iter === 0) nowInContact[i] = false;
            }
        }
        if (!anyCollision) break;
    }

    // 更新接触状态
    prevInContact = nowInContact.slice();

    if (impactStrength > 0) {
        collisionFlashTimer = 0.3;
        const now = performance.now() / 1000;
        if (now - lastSoundTime >= SOUND_COOLDOWN) {
            lastSoundTime = now;
            // impactStrength 是线速度量级，范围大约 0.1~15+
            // 用对数映射让轻碰和重碰都有明显区分
            const normalized = Math.min(1, Math.log(1 + impactStrength * 2) / Math.log(1 + 20));
            playCollisionSound(normalized);
        }
    }
}

// ============================================================
//  交互
// ============================================================
function setupInteraction() {
    const canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', onPointerDown, { capture: true });
    window.addEventListener('pointermove', onPointerMove, { passive: true });
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);
}

function onPointerDown(e) {
    if (e.button !== 0) return;

    // 首次交互时激活音频上下文（浏览器自动播放策略）
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    updateMouseNDC(e);
    raycaster.setFromCamera(mouseNDC, camera);
    const hits = raycaster.intersectObjects(ballMeshes);

    if (hits.length > 0) {
        const idx = ballMeshes.indexOf(hits[0].object);
        if (idx >= 0) {
            e.stopPropagation();  // 阻止 OrbitControls 接收此事件
            isDragging = true;
            draggedIndex = idx;
            ballStates[idx].isDragging = true;
            ballStates[idx].angVel = 0;
            orbitControls.enabled = false;
            renderer.domElement.style.cursor = 'grabbing';
        }
    }
}

function onPointerMove(e) {
    updateMouseNDC(e);

    if (isDragging && draggedIndex >= 0) {
        const b = ballStates[draggedIndex];
        const ft = getFrameTop();
        const L = config.ropeLength;

        raycaster.setFromCamera(mouseNDC, camera);
        const hit = raycaster.ray.intersectPlane(_dragPlane, _dragPt);

        if (hit) {
            const dx = _dragPt.x - b.anchorX;
            const dy = ft - _dragPt.y;
            if (dy > 0.05) {
                let newAngle = Math.atan2(dx, dy);
                newAngle = Math.max(-Math.PI * 0.48, Math.min(Math.PI * 0.48, newAngle));
                b.angle = newAngle;
                b.angVel = 0;
                pushNeighbors(draggedIndex);
            }
        }
        // 不在这里调 updateBallVisuals()，让动画循环统一更新
    } else if (!isDragging) {
        // 节流 hover 检测，减少 raycasting 开销
        const now = performance.now();
        if (now - _lastHoverCheck > 50) {
            _lastHoverCheck = now;
            raycaster.setFromCamera(mouseNDC, camera);
            const hits = raycaster.intersectObjects(ballMeshes);
            renderer.domElement.style.cursor = hits.length > 0 ? 'grab' : 'default';
        }
    }
}

function onPointerUp() {
    if (isDragging && draggedIndex >= 0) {
        ballStates[draggedIndex].isDragging = false;
        ballStates[draggedIndex].angVel = 0;
        isDragging = false;
        draggedIndex = -1;
    }
    orbitControls.enabled = true;
    renderer.domElement.style.cursor = 'default';
}

function updateMouseNDC(e) {
    mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

function pushNeighbors(idx) {
    const L = config.ropeLength;
    const minDist = 2 * config.ballRadius;
    const b = ballStates[idx];
    const bx = b.anchorX + L * Math.sin(b.angle);

    // 向右推
    if (idx < ballStates.length - 1) {
        const r = ballStates[idx + 1];
        const rx = r.anchorX + L * Math.sin(r.angle);
        if (bx + minDist > rx) {
            const targetX = bx + minDist;
            const sinA = (targetX - r.anchorX) / L;
            if (Math.abs(sinA) <= 1) {
                r.angle = Math.asin(sinA);
                r.angVel = 0;
                pushNeighbors(idx + 1);
            }
        }
    }

    // 向左推
    if (idx > 0) {
        const l = ballStates[idx - 1];
        const lx = l.anchorX + L * Math.sin(l.angle);
        if (lx + minDist > bx) {
            const targetX = bx - minDist;
            const sinA = (targetX - l.anchorX) / L;
            if (Math.abs(sinA) <= 1) {
                l.angle = Math.asin(sinA);
                l.angVel = 0;
                pushNeighbors(idx - 1);
            }
        }
    }
}

// ============================================================
//  UI 绑定
// ============================================================
function setupUI() {
    bindSlider('gravity', 'gravity-val', v => { config.gravity = v; }, 1);
    bindSlider('damping', 'damping-val', v => { config.airResistance = v; }, 3);
    bindSlider('timespeed', 'timespeed-val', v => { config.timeSpeed = v; }, 1);
    bindSlider('ropelen', 'ropelen-val', v => { config.ropeLength = v; updateCradleLayout(); }, 1);
    bindSlider('spacing', 'spacing-val', v => { config.spacingMultiplier = v; updateCradleLayout(); }, 1);
    bindSlider('ballcount', 'ballcount-val', v => { config.numBalls = Math.round(v); buildCradle(); }, 0, true);

    document.getElementById('btn-demo').addEventListener('click', () => {
        resetBalls();
        if (ballStates.length > 0) {
            ballStates[0].angle = -Math.PI / 4;
            ballStates[0].angVel = 0;
            updateBallVisuals();
        }
    });

    document.getElementById('btn-reset').addEventListener('click', resetBalls);

    const pauseBtn = document.getElementById('btn-pause');
    pauseBtn.addEventListener('click', () => {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '继续' : '暂停';
        pauseBtn.classList.toggle('resumed', isPaused);
    });
}

/**
 * 绑定滑块到值显示
 * @param {string} sliderId - 滑块元素 ID
 * @param {string} valueId - 值显示元素 ID
 * @param {function} onChange - 值变化回调
 * @param {number} decimals - 小数位数
 * @param {boolean} isInt - 是否为整数
 */
function bindSlider(sliderId, valueId, onChange, decimals = 1, isInt = false) {
    const slider = document.getElementById(sliderId);
    const valueEl = document.getElementById(valueId);

    function updateDisplay() {
        const v = isInt ? parseInt(slider.value) : parseFloat(slider.value);
        valueEl.textContent = isInt ? v : v.toFixed(decimals);
        onChange(v);
    }

    slider.addEventListener('input', updateDisplay);
}

function resetBalls() {
    for (const b of ballStates) {
        b.angle = 0;
        b.angVel = 0;
        b.isDragging = false;
    }
    isDragging = false;
    draggedIndex = -1;
    orbitControls.enabled = true;
    updateBallVisuals();
}

// ============================================================
//  动画循环
// ============================================================
function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    if (!isPaused) {
        updatePhysics(dt); // 内部已调用 updateBallVisuals
    } else if (isDragging) {
        updateBallVisuals(); // 暂停时拖拽仍需更新视觉
    }
    orbitControls.update();

    if (collisionFlashTimer > 0) {
        collisionFlashTimer -= dt;
        document.getElementById('collision-flash').classList.add('visible');
    } else {
        document.getElementById('collision-flash').classList.remove('visible');
    }

    renderer.render(scene, camera);

    fpsFrames++;
    fpsTime += dt;
    if (fpsTime >= 0.5) {
        document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime) + ' FPS';
        fpsFrames = 0;
        fpsTime = 0;
    }
}

// ============================================================
//  启动
// ============================================================
initScene();
buildCradle();
setupInteraction();
setupUI();
animate();

</script>
</body>
